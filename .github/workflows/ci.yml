name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

jobs:
  formatting:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: Check formatting
        shell: pwsh
        run: |
          $files = git ls-files '*.cpp' '*.h'
          clang-format --dry-run --Werror $files

  build-and-test:
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]
    steps:
      - uses: actions/checkout@v4
      - uses: ilammy/msvc-dev-cmd@v1
      - name: Configure
        shell: pwsh
        run: |
          $tidy = if ('${{ matrix.configuration }}' -eq 'Debug') { 'ON' } else { 'OFF' }
          cmake -S . -B out/build/ci-${{ matrix.configuration }} -G Ninja `
            -DCMAKE_BUILD_TYPE=${{ matrix.configuration }} `
            -DMARVIN_ENABLE_CLANG_TIDY=$tidy
      - name: Build
        run: cmake --build out/build/ci-${{ matrix.configuration }}
      - name: Test
        run: ctest --test-dir out/build/ci-${{ matrix.configuration }} --output-on-failure

  address-sanitizer:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - uses: ilammy/msvc-dev-cmd@v1
      - name: Configure
        run: >-
          cmake -S . -B out/build/ci-asan -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DMARVIN_ENABLE_ASAN=ON
      - name: Build
        run: cmake --build out/build/ci-asan
      - name: Test
        run: ctest --test-dir out/build/ci-asan --output-on-failure
